<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Weather lookup page for Lebanon Trail Guide routes.">
    <title>Conditions | Lebanon Trail Guide</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top site-nav">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="index.html">Lebanon Trail Guide</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#primaryNav" aria-controls="primaryNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="primaryNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="trails.html">Trails</a></li>
            <li class="nav-item"><a class="nav-link active" href="conditions.html">Conditions</a></li>
          </ul>
          <a class="btn btn-outline-light btn-sm ms-lg-3 mt-3 mt-lg-0" href="#" role="button" data-auth-login-button>Login</a>
        </div>
      </div>
    </nav>

    <main class="page-band">
      <section class="container py-5">
        <div class="section-heading">
          <p class="eyebrow">Weather lookup</p>
          <h1>Trail Conditions</h1>
        </div>
        <div class="row g-4">
          <div class="col-lg-5">
            <form id="weather-form" class="tool-panel">
              <label class="form-label" for="weather-location">Location</label>
              <input class="form-control" id="weather-location" name="location" type="text" value="Bcharre" autocomplete="address-level2">
              <button class="btn btn-primary mt-3" type="submit">Check conditions</button>
            </form>
          </div>
          <div class="col-lg-7">
            <div id="weather-result" class="weather-result" aria-live="polite">
              Enter a trail town or region to view estimated hiking conditions.
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-social" aria-label="Social media links">
          <a href="https://github.com/eddyhneineh" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i class="bi bi-github"></i></a>
          <a href="https://www.linkedin.com/in/eddy-hneineh-51b582356" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>
          <a href="https://www.instagram.com/eddyhneineh" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
        </div>
        <a class="footer-email" href="mailto:eddyjhneineh@gmail.com" target="_blank" rel="noopener noreferrer">eddyjhneineh@gmail.com</a>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.178.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.178.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
